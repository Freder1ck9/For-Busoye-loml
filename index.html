<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTIC | For Busoye</title>
    <style>
        :root {
            --neon-purple: #bc13fe;
            --white: #ffffff;
            --dark: #0a0a0a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Background Glow Animation */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-purple);
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.2;
            animation: pulse 8s infinite alternate;
            z-index: 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.15; }
            100% { transform: scale(1.3); opacity: 0.3; }
        }

        .container {
            text-align: center;
            z-index: 1;
            max-width: 600px;
        }

        /* Animated Heading */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.6);
            animation: fadeInDown 1.5s ease-out;
        }

        .emoji {
            font-size: 3rem;
            display: inline-block;
            animation: bounce 2s infinite;
            margin-bottom: 20px;
        }

        /* Typewriter Text Container */
        .message-box {
            min-height: 60px;
            margin-top: 15px;
        }

        .typing-text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #e0e0e0;
            border-right: 2px solid var(--neon-purple);
            white-space: normal;
            display: inline;
            animation: blink 0.75s step-end infinite;
        }

        /* Footer Branding */
        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            animation: fadeIn 3s ease-in;
        }

        footer span {
            color: var(--neon-purple);
            font-weight: bold;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: var(--neon-purple); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Happy Birthday, Busoye!</h1>
        <div class="emoji">🎉🥳</div>
        
        <div class="message-box">
            <span class="typing-text" id="typed-text"></span>
        </div>
    </div>

    <footer>A <span>TACTIC</span> prod.</footer>

    <script>
        // The text that will automatically type out on screen
        const textToType = "Happy bday Busoye! I love you and wish you many more amazing years to come...";
        let index = 0;
        const speed = 70; // Speed in milliseconds per character

        function typeWriter() {
            if (index < textToType.length) {
                document.getElementById("typed-text").innerHTML += textToType.charAt(index);
                index++;
                setTimeout(typeWriter, speed);
            } else {
                // Keep the cursor solid when done typing
                document.getElementById("typed-text").style.borderRight = "2px solid var(--neon-purple)";
            }
        }

        // Start typing effect after everything loads smoothly
        window.onload = function() {
            setTimeout(typeWriter, 500);
        };
    </script>
</body>
</html>
