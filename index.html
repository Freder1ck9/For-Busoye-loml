<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTIC | For Busoye</title>
    <style>
        :root {
            --neon-purple: #bc13fe;
            --white: #ffffff;
            --dark: #0a0a0a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Background Glow Animation */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-purple);
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.2;
            animation: pulse 8s infinite alternate;
            z-index: 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.15; }
            100% { transform: scale(1.3); opacity: 0.3; }
        }

        .container {
            text-align: center;
            z-index: 1;
            max-width: 600px;
            width: 100%;
        }

        /* Animated Heading */
        h1 {
            font-size: 2.3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.6);
            animation: fadeInDown 1.5s ease-out;
        }

        .emoji {
            font-size: 3rem;
            display: inline-block;
            animation: bounce 2s infinite;
            margin-bottom: 20px;
        }

        /* Typewriter Text Containers */
        .message-box {
            min-height: 50px;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .typing-text {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #e0e0e0;
            border-right: 2px solid var(--neon-purple);
            white-space: normal;
            display: inline;
        }

        .blink {
            animation: blinkCursor 0.75s step-end infinite;
        }

        /* Secret Button styling */
        .secret-btn {
            background: transparent;
            color: var(--white);
            border: 2px solid var(--neon-purple);
            padding: 10px 20px;
            font-size: 0.95rem;
            border-radius: 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.2);
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
            margin: 20px auto 0 auto;
            display: block;
        }

        .secret-btn.show {
            opacity: 1;
            visibility: visible;
            animation: fadeIn 1s ease-in;
        }

        .secret-btn:hover {
            background: var(--neon-purple);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.6);
            transform: scale(1.05);
        }

        /* Secret Area box */
        .secret-container {
            margin-top: 25px;
            padding: 15px;
            border-left: 2px dashed rgba(188, 19, 254, 0.5);
            background: rgba(188, 19, 254, 0.03);
            border-radius: 0 8px 8px 0;
            text-align: left;
            display: none;
        }

        .secret-title {
            font-size: 0.9rem;
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .secret-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #d1d1d1;
            font-style: italic;
        }

        /* Footer Branding */
        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            z-index: 1;
        }

        footer span {
            color: var(--neon-purple);
            font-weight: bold;
        }

        /* Keyframe Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        @keyframes blinkCursor {
            from, to { border-color: transparent }
            50% { border-color: var(--neon-purple); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Happy Birthday, Busoye!</h1>
        <div class="emoji">🎉🥳</div>
        
        <div class="message-box">
            <span class="typing-text blink" id="main-text"></span>
        </div>

        <!-- Secret Box Trigger -->
        <button class="secret-btn" id="secret-trigger" onclick="revealSecret()">Show Secret Message</button>

        <!-- Hidden Container for the Easter Egg -->
        <div class="secret-container" id="secret-box">
            <div class="secret-title">✨ A Note from Me to You</div>
            <span class="typing-text" id="secret-message"></span>
        </div>
    </div>

    <footer>A <span>TACTIC</span> prod.</footer>

    <script>
        // Main greeting configurations
        const mainText = "Happy bday Busoye! I love you and wish you many more amazing years to come...";
        let mainIdx = 0;

        // Easter Egg configurations
        const secretText = "I always admired you so much that I had a crush on you for months even till date and I was kinda glad we became friends, like I'm fr so happy but that doesn't matter, what matters is that today is your birthday my love ❤️";
        let secretIdx = 0;

        function typeMainMessage() {
            if (mainIdx < mainText.length) {
                document.getElementById("main-text").innerHTML += mainText.charAt(mainIdx);
                mainIdx++;
                setTimeout(typeMainMessage, 60);
            } else {
                // Done writing main message. Stop blinking and fade in the secret button
                document.getElementById("main-text").classList.remove('blink');
                document.getElementById("main-text").style.borderRight = "none";
                document.getElementById("secret-trigger").classList.add('show');
            }
        }

        function revealSecret() {
            // Hide the trigger button smoothly
            const btn = document.getElementById("secret-trigger");
            btn.style.display = "none";
            
            // Show the secret display layout box
            const secretBox = document.getElementById("secret-box");
            secretBox.style.display = "block";
            
            // Start the secret message typewriter effect
            document.getElementById("secret-message").classList.add('blink');
            typeSecretMessage();
        }

        function typeSecretMessage() {
            if (secretIdx < secretText.length) {
                document.getElementById("secret-message").innerHTML += secretText.charAt(secretIdx);
                secretIdx++;
                setTimeout(typeSecretMessage, 50);
            } else {
                // Final layout adjustments once everything finishes typing
                document.getElementById("secret-message").classList.remove('blink');
            }
        }

        // Initialize the flow smoothly on load
        window.onload = function() {
            setTimeout(typeMainMessage, 800);
        };
    </script>
</body>
</html>
