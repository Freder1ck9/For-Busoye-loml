<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTIC | For Busoye</title>
    <style>
        :root {
            --neon-purple: #bc13fe;
            --white: #ffffff;
            --dark: #000000;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #lockscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .lock-box {
            text-align: center;
            background: #111;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--neon-purple);
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .lock-box h2 {
            margin-bottom: 20px;
        }

        input[type="password"] {
            padding: 12px;
            border: 1px solid #333;
            background: #222;
            color: #fff;
            border-radius: 4px;
            text-align: center;
            font-size: 16px;
            display: block;
            margin: 0 auto 15px auto;
            outline: none;
            width: 200px;
        }

        input[type="password"]:focus {
            border-color: var(--neon-purple);
        }

        .lock-box button {
            padding: 10px 25px;
            background: var(--neon-purple);
            color: #fff;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        #error-message {
            color: #ff3333;
            margin-top: 15px;
            font-size: 14px;
            display: none;
        }

        #main-content {
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- THE LOCK SCREEN -->
    <div id="lockscreen">
        <div class="lock-box">
            <h2>Enter Access Code</h2>
            <input type="password" id="password-input" placeholder="Enter Birthday Code" maxlength="4">
            <button onclick="checkPassword()">Unlock</button>
            <p id="error-message">Access Denied. Try again.</p>
        </div>
    </div>

    <!-- THE SURPRISE WEBSITE CONTENT -->
    <div id="main-content">
        <h1>Happy Birthday, Busoye! 🥳</h1>
        <p>Welcome to your definitive edition surprise website.</p>
        <!-- You can add more cool text, animations, or pictures here later! -->
    </div>

    <!-- THE JAVASCRIPT LOGIC -->
    <script>
    function checkPassword() {
        const input = document.getElementById('password-input').value;
        const errorMessage = document.getElementById('error-message');
        
        // Accepts 0907 (July 9th) as the birthday code
        if (input === '0907') {
            document.getElementById('lockscreen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        } else {
            errorMessage.style.display = 'block';
            document.getElementById('password-input').value = ''; // Clears input
        }
    }

    // Allow pressing "Enter" on mobile keyboards to unlock
    document.getElementById('password-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            checkPassword();
        }
    });
    </script>

</body>
</html>
