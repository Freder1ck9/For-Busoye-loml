<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTIC | For Busoye</title>
    <style>
        :root {
            --neon-purple: #bc13fe;
            --matrix-green: #00ff41;
            --white: #ffffff;
            --dark: #050505;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* Matrix Rain Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15; /* Keeps it clean and readable background */
        }

        .container {
            text-align: center;
            z-index: 1;
            max-width: 600px;
            width: 100%;
            background: rgba(5, 5, 5, 0.85);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(188, 19, 254, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        /* Password Screen Styling */
        #password-screen {
            z-index: 2;
        }

        .pass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--neon-purple);
            color: white;
            padding: 12px 20px;
            font-size: 1.2rem;
            border-radius: 8px;
            text-align: center;
            outline: none;
            margin-bottom: 15px;
            width: 160px;
            letter-spacing: 4px;
        }

        .pass-btn {
            background: var(--neon-purple);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .pass-btn:hover {
            box-shadow: 0 0 15px var(--neon-purple);
            transform: scale(1.05);
        }

        /* Main Content Styling */
        #main-content {
            display: none;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(188, 19, 254, 0.6);
        }

        .message-box {
            min-height: 60px;
            margin: 20px 0;
        }

        .typing-text {
            font-size: 1.15rem;
            line-height: 1.6;
            color: #e0e0e0;
            display: inline;
        }

        .blink {
            border-right: 2px solid var(--neon-purple);
            animation: blinkCursor 0.75s step-end infinite;
        }

        /* Countdown Timer UI */
        #timer-box {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            border-radius: 8px;
        }

        .timer-title {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .countdown {
            font-size: 2rem;
            font-weight: bold;
            color: var(--matrix-green);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
        }

        /* Interactive Confirmation Box */
        #confirm-box {
            display: none;
            margin-top: 25px;
            animation: fadeIn 1s ease-in;
        }

        #confirm-box p {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--matrix-green);
        }

        .choice-btn {
            background: transparent;
            color: white;
            border: 2px solid var(--matrix-green);
            padding: 10px 25px;
            font-size: 1rem;
            margin: 0 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .choice-btn:hover {
            background: var(--matrix-green);
            color: black;
            box-shadow: 0 0 15px var(--matrix-green);
        }

        /* Secret Message Display */
        #secret-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-left: 3px solid var(--neon-purple);
            background: rgba(188, 19, 254, 0.03);
            text-align: left;
            animation: fadeIn 1s ease-in;
        }

        .secret-title {
            font-size: 0.9rem;
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        /* Faint Branding Footer */
        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: rgba(255, 255, 255, 0.15); /* Faint layout */
            text-transform: uppercase;
            z-index: 1;
            font-family: sans-serif;
        }

        footer span {
            color: rgba(188, 19, 254, 0.25);
            font-weight: bold;
        }

        @keyframes blinkCursor {
            from, to { border-color: transparent }
            50% { border-color: var(--neon-purple); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <!-- Phase 1: Password Lock Screen -->
    <div class="container" id="password-screen">
        <h1 style="font-size: 1.5rem; margin-bottom: 20px; color: var(--neon-purple);">SYSTEM LOCKED</h1>
        <p style="margin-bottom: 20px; color: #888;">Enter decryption code to access the surprise:</p>
        <input type="password" id="password-input" class="pass-input" placeholder="••••" maxlength="4">
        <br>
        <button class="pass-btn" onclick="checkPassword()">UNLOCK</button>
        <p id="error-msg" style="color: red; margin-top: 10px; font-size: 0.9rem; display: none;">Invalid Code.</p>
    </div>

    <!-- Phase 2: Main Content (Hidden initially) -->
    <div class="container" id="main-content">
        <h1>Happy Birthday, Busoye! 🎉</h1>
        
        <div class="message-box">
            <span class="typing-text blink" id="main-text"></span>
        </div>

        <!-- Countdown Notice -->
        <div id="timer-box">
            <div class="timer-title">Decrypting payload: Secondary secret incoming...</div>
            <div class="countdown" id="countdown-clock">57</div>
        </div>

        <!-- Interactive Confirmation -->
        <div id="confirm-box">
            <p>Are you really sure you want to read this?</p>
            <button class="choice-btn" onclick="showFinalSecret()">Yes</button>
        </div>

        <!-- Final Hidden Confession -->
        <div id="secret-box">
            <div class="secret-title">// SECRET DECRYPTED SUCCESSFULLY</div>
            <span class="typing-text blink" id="secret-text"></span>
        </div>
    </div>

    <footer>A <span>TACTIC</span> prod....</footer>

    <script>
        // Matrix Rain Setup
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789SYS_LOCKED_🎂🎉❤️";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = Array.from({ length: columns }).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#bc13fe'; // Purple matrix tint to match theme
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Application Scripts
        const mainMessage = "Happy bday Busoye! I love you and wish you many more amazing years to come...";
        const secretMessage = "I always admired you so much that I had a crush on you for months even till date and I was kinda glad we became friends, like I fr so happy but that doesn't matter, what matters is that today is your birthday my love ❤️";
        
        let mainIdx = 0;
        let secretIdx = 0;
        let timeLeft = 57;

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === '0907') { // Password check
                document.getElementById('password-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                setTimeout(typeMainMessage, 500);
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function typeMainMessage() {
            if (mainIdx < mainMessage.length) {
                document.getElementById("main-text").innerHTML += mainMessage.charAt(mainIdx);
                mainIdx++;
                setTimeout(typeMainMessage, 60);
            } else {
                document.getElementById("main-text").classList.remove('blink');
                startCountdown();
            }
        }

        function startCountdown() {
            document.getElementById('timer-box').style.display = 'block';
            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById('countdown-clock').textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById('timer-box').style.display = 'none';
                    document.getElementById('confirm-box').style.display = 'block';
                }
            }, 1000);
        }

        function showFinalSecret() {
            document.getElementById('confirm-box').style.display = 'none';
            document.getElementById('secret-box').style.display = 'block';
            typeSecretMessage();
        }

        function typeSecretMessage() {
            if (secretIdx < secretMessage.length) {
                document.getElementById("secret-text").innerHTML += secretMessage.charAt(secretIdx);
                secretIdx++;
                setTimeout(typeSecretMessage, 50);
            } else {
                document.getElementById("secret-text").classList.remove('blink');
            }
        }
    </script>
</body>
</html>
